<!DOCTYPE html>
<html>
<head>
<title>Golf Rewards Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: #f1f5f9;
  color: #1e293b;
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 220px;
  background: #1e293b;
  color: white;
  height: 100vh;
  padding: 20px;
}

.sidebar h2 {
  margin-bottom: 20px;
}

.sidebar button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  background: #334155;
  border: none;
  color: white;
  cursor: pointer;
}

/* Main */
.main {
  flex: 1;
  padding: 20px;
}

/* Header */
.header {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

/* Cards */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #e2e8f0;
}

/* Inputs */
input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: 1px solid #cbd5e1;
  border-radius: 6px;
}

/* Button */
.btn {
  margin-top: 10px;
  padding: 10px;
  width: 100%;
  border: none;
  background: #2563eb;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* Chart */
.chart {
  height: 150px;
  display: flex;
  align-items: flex-end;
  gap: 10px;
  margin-top: 10px;
}

.bar {
  width: 30px;
  background: #2563eb;
  text-align: center;
  color: white;
  font-size: 10px;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>🏌️ Golf App</h2>
  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('add')">Add Score</button>
  <button onclick="show('draw')">Draw</button>
</div>

<div class="main">

  <div class="header">
    <h2>Golf Rewards Dashboard</h2>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <div class="grid">
      <div class="card">
        <h3>Total Scores</h3>
        <p id="total">0</p>
      </div>

      <div class="card">
        <h3>Last Score</h3>
        <p id="last">-</p>
      </div>

      <div class="card">
        <h3>Score Chart</h3>
        <div id="chart" class="chart"></div>
      </div>
    </div>
  </div>

  <!-- Add Score -->
  <div id="add" style="display:none;">
    <div class="card">
      <h3>Add Score</h3>
      <input id="username" placeholder="Username">
      <input id="score" type="number">
      <input id="date" type="date">
      <button class="btn" onclick="addScore()">Submit</button>
    </div>
  </div>

  <!-- Draw -->
  <div id="draw" style="display:none;">
    <div class="card">
      <h3>Run Draw</h3>
      <button class="btn" onclick="draw()">Run</button>
      <div id="result"></div>
    </div>
  </div>

</div>

<script>

// navigation
function show(section) {
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("add").style.display = "none";
  document.getElementById("draw").style.display = "none";

  document.getElementById(section).style.display = "block";
}

// prevent past dates
window.onload = () => {
  const today = new Date().toISOString().split("T")[0];
  date.min = today;
};

let scores = [];

// add score
async function addScore() {
  const res = await fetch("/add-score", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: username.value,
      score: score.value,
      date: date.value
    })
  });

  const data = await res.json();
  scores = data;
  updateDashboard();
}

// update dashboard
function updateDashboard() {
  total.innerText = scores.length;
  last.innerText = scores.length ? scores[scores.length - 1].score : "-";

  chart.innerHTML = "";

  scores.forEach(s => {
    let bar = document.createElement("div");
    bar.className = "bar";
    bar.style.height = (s.score * 2) + "px";
    bar.innerText = s.score;
    chart.appendChild(bar);
  });
}

// draw
async function draw() {
  const res = await fetch("/draw");
  const data = await res.json();

  result.innerHTML =
    "Draw: " + data.drawNumbers.join(", ") +
    "<br>" +
    (data.winners.length
      ? data.winners.map(w => w.username).join("<br>")
      : "No winners");
}

</script>

</body>
</html>
