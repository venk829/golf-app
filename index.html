<!DOCTYPE html>
<html>
<head>
<title>Golf Rewards Platform</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box; 
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #e38fa1, #d496b2);
  color: #e2e8f0;
}

/* Header */
.header {
  text-align: center;
  padding: 30px;
}

.header h1 {
  color: #f3f4f6;
}

/* Layout */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* Card */
.card {
  background: rgba(15,23,42,0.9);
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  overflow: hidden; 
}

/* Inputs & Buttons */
input, button {
  width: 100%;
  max-width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  display: block;
}

/* Input style */
input {
  background: #020617;
  color: white;
  border: 1px solid rgba(148,163,184,0.2);
}

/* Button style */
button {
  background: linear-gradient(45deg, #3b82f6, #8b5cf6);
  color: white;
  cursor: pointer;
  font-weight: 600;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
}

/* Output */
#scoresList, #result {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
  <h1>🏆 Golf Rewards Platform</h1>
</div>

<div class="container">

  <div class="card">
    <h3>👤 Signup</h3>
    <input id="username" placeholder="Enter username">
    <button onclick="signup()">Signup</button>
  </div>

  <div class="card">
    <h3>📊 Add Score</h3>
    <input id="score" type="number" min="1" max="45" placeholder="Enter score (1-45)">
    <input id="date" type="date">
    <button onclick="addScore()">Submit</button>
  </div>

  <div class="card">
    <h3>📈 Your Scores</h3>
    <div id="scoresList"></div>
  </div>

  <div class="card">
    <h3>🎯 Draw</h3>
    <button onclick="draw()">Run Draw</button>
    <div id="result"></div>
  </div>

</div>

<script>

// ✅ Prevent past dates
window.onload = () => {
  const today = new Date().toISOString().split("T")[0];
  document.getElementById("date").setAttribute("min", today);
};

// Signup
async function signup() {
  const res = await fetch("/signup", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username: username.value })
  });
  alert(await res.text());
}

// Add Score
async function addScore() {
  const res = await fetch("/add-score", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: username.value,
      score: score.value,
      date: date.value
    })
  });

  const data = await res.json();
  scoresList.innerHTML = data.map(s => `⭐ ${s.score} (${s.date})`).join("<br>");
}

// Draw
async function draw() {
  const res = await fetch("/draw");
  const data = await res.json();

  let text = `<b>Draw Numbers:</b> ${data.drawNumbers.join(", ")}<br>`;

  if (data.winners.length === 0) {
    text += "❌ No winners";
  } else {
    data.winners.forEach(w => {
      text += `<br>🏆 ${w.username} (${w.matches} matches)`;
    });
  }

  result.innerHTML = text;
}

</script>

</body>
</html>
